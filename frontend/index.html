<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBalance - Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Minhas Tarefas</h1>
            <p>Gerencie seu dia de forma simples</p>
        </header>

        <section class="input-section">
            <input type="text" id="task-title" placeholder="O que precisa ser feito?">
            <textarea id="task-desc" placeholder="Descrição (opcional)"></textarea>
            <button id="add-btn">Adicionar Tarefa</button>
        </section>

        <section class="list-section">
            <ul id="task-list">
                </ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
